steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "australia-southeast1-docker.pkg.dev/$PROJECT_ID/sit323-repo/node-app:$SHORT_SHA"
      - "."

  # Push image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "australia-southeast1-docker.pkg.dev/$PROJECT_ID/sit323-repo/node-app:$SHORT_SHA"

  # Deploy to GKE
  - name: "gcr.io/cloud-builders/kubectl"
    args:
      - "set"
      - "image"
      - "deployment/node-app"
      - "node-app=australia-southeast1-docker.pkg.dev/$PROJECT_ID/sit323-repo/node-app:$SHORT_SHA"
    env:
      - "CLOUDSDK_COMPUTE_ZONE=australia-southeast1-a"
      - "CLOUDSDK_CONTAINER_CLUSTER=YOUR_CLUSTER_NAME"

options:
  logging: CLOUD_LOGGING_ONLY
